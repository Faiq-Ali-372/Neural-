version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuralsol-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./neuralsol.db
      - SOLANA_RPC=https://api.devnet.solana.com
      - PLATFORM_WALLET=7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuralsol-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
    depends_on:
      - backend
    command: npm run dev
    restart: unless-stopped

  # Uncomment below to use PostgreSQL instead of SQLite in production
